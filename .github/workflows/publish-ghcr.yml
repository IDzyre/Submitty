name: Build and Publish Submitty GHCR

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ci/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/submitty-prebuilt:main
            ghcr.io/${{ github.repository_owner }}/submitty-prebuilt:${{ github.sha }}
